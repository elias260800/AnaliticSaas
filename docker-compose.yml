version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: analitic_saas_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: SecurePassword123
      POSTGRES_DB: analitic_saas
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
